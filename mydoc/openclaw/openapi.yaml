openapi: 3.1.0
jsonSchemaDialect: https://spec.openapis.org/oas/3.1/dialect/base
info:
  title: VCP Bridge API
  version: 1.0.0
  summary: OpenClaw 到 VCPToolBox 的原生工具与记忆桥接接口
  description: |
    VCP Bridge API 用于将 OpenClaw 原生工具调用、记忆检索、上下文召回与记忆写回
    映射到 VCPToolBox 的插件系统与 RAG 能力。

    当前版本约束：
    - 基于 VCPToolBox admin_api 权限边界，默认使用 Basic Auth
    - 所有响应都返回统一 envelope，并附带 meta.requestId 便于审计
    - bridgeVersion 当前固定为 v1
servers:
  - url: http://127.0.0.1:6005
    description: Local VCPToolBox server
security:
  - basicAuth: []
tags:
  - name: Health
    description: Bridge 健康检查与可用性探测
  - name: Capabilities
    description: 面向 OpenClaw Agent 的能力发现
  - name: Tools
    description: VCP 插件工具调用桥接
  - name: Rag
    description: 检索、上下文构建与记忆目标发现
  - name: Memory
    description: OpenClaw 记忆写回到 VCP 持久化系统
paths:
  /admin_api/openclaw/health:
    get:
      tags:
        - Health
      operationId: getBridgeHealth
      summary: Check VCP Bridge health
      description: 返回桥接服务与关键依赖的健康状态。
      responses:
        '200':
          description: Bridge is reachable
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
            x-openclaw-bridge-version:
              $ref: '#/components/headers/XOpenClawBridgeVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      status: ok
                      serverTime: '2026-03-29T09:00:00Z'
                      pluginManagerReady: true
                      knowledgeBaseReady: true
                      bridgeVersion: v1
                    meta:
                      requestId: req_health_001
                      bridgeVersion: v1
                      durationMs: 4
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin_api/openclaw/capabilities:
    get:
      tags:
        - Capabilities
      operationId: getCapabilities
      summary: Get bridge capabilities for an OpenClaw agent
      description: 返回当前 Agent 可访问的工具能力与记忆能力概览。
      parameters:
        - name: agentId
          in: query
          required: true
          description: OpenClaw Agent 的唯一标识
          schema:
            type: string
            minLength: 1
        - name: includeDisabled
          in: query
          required: false
          description: 是否返回不可用工具的描述信息
          schema:
            type: boolean
            default: false
        - name: includeMemoryTargets
          in: query
          required: false
          description: 是否携带可访问记忆目标列表
          schema:
            type: boolean
            default: true
      responses:
        '200':
          description: Capabilities loaded
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
            x-openclaw-bridge-version:
              $ref: '#/components/headers/XOpenClawBridgeVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CapabilitiesResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      server:
                        name: VCPToolBox
                        version: 2.3.0
                        bridgeVersion: v1
                      tools:
                        - name: search_knowledge
                          displayName: Search Knowledge
                          pluginType: synchronous
                          distributed: false
                          approvalRequired: false
                          timeoutMs: 30000
                          description: Search knowledge base content
                          inputSchema:
                            type: object
                            properties:
                              query:
                                type: string
                            required:
                              - query
                      memory:
                        targets:
                          - id: diary.default
                            displayName: Default Diary
                            type: diary
                            allowed: true
                        features:
                          timeAware: true
                          groupAware: true
                          rerank: true
                          tagMemo: true
                          writeBack: true
                    meta:
                      requestId: req_cap_001
                      bridgeVersion: v1
                      durationMs: 12
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin_api/openclaw/tools/{toolName}:
    post:
      tags:
        - Tools
      operationId: invokeTool
      summary: Invoke a VCP tool from OpenClaw
      description: 调用 VCPToolBox 中已暴露给 OpenClaw Agent 的工具。
      parameters:
        - name: toolName
          in: path
          required: true
          description: 工具名称
          schema:
            type: string
            minLength: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InvokeToolRequest'
            examples:
              invokeTool:
                value:
                  args:
                    query: latest deployment checklist
                  requestContext:
                    source: openclaw
                    agentId: agent.support
                    sessionId: sess_1001
                    requestId: oc_req_001
      responses:
        '200':
          description: Tool invocation succeeded
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
            x-openclaw-bridge-version:
              $ref: '#/components/headers/XOpenClawBridgeVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InvokeToolResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      toolName: search_knowledge
                      result:
                        items:
                          - title: Deployment Checklist
                            score: 0.93
                      audit:
                        approvalUsed: false
                        distributed: false
                    meta:
                      requestId: req_tool_001
                      bridgeVersion: v1
                      durationMs: 42
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'
        '504':
          $ref: '#/components/responses/TimeoutError'
  /admin_api/openclaw/rag/targets:
    get:
      tags:
        - Rag
      operationId: listRagTargets
      summary: List available RAG targets for an OpenClaw agent
      description: 返回当前 Agent 可访问的 diary 或 knowledge base 目标。
      parameters:
        - name: agentId
          in: query
          required: true
          schema:
            type: string
            minLength: 1
      responses:
        '200':
          description: Targets loaded
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
            x-openclaw-bridge-version:
              $ref: '#/components/headers/XOpenClawBridgeVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagTargetsResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      targets:
                        - id: diary.default
                          displayName: Default Diary
                          type: diary
                          allowed: true
                        - id: kb.project-alpha
                          displayName: Project Alpha KB
                          type: knowledge_base
                          allowed: true
                    meta:
                      requestId: req_targets_001
                      bridgeVersion: v1
                      durationMs: 7
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin_api/openclaw/rag/search:
    post:
      tags:
        - Rag
      operationId: searchRag
      summary: Search VCP memory targets with structured RAG options
      description: 统一封装 diary 与 knowledge base 检索能力。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagSearchRequest'
            examples:
              ragSearch:
                value:
                  query: 用户上次提到的部署失败原因
                  diary: default
                  k: 5
                  mode: rag
                  options:
                    timeAware: true
                    groupAware: false
                    rerank: true
                    tagMemo: true
                  requestContext:
                    source: openclaw
                    agentId: agent.support
                    sessionId: sess_1001
                    requestId: oc_req_002
      responses:
        '200':
          description: Search completed
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
            x-openclaw-bridge-version:
              $ref: '#/components/headers/XOpenClawBridgeVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagSearchResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      items:
                        - id: entry_001
                          text: 上次部署失败原因为环境变量缺失
                          score: 0.95
                          sourceDiary: default
                          sourceFile: diary_default_20260328.md
                          timestamp: '2026-03-28T12:10:00Z'
                          tags:
                            - deployment
                            - env
                      diagnostics:
                        provider: diary
                        totalCandidates: 12
                    meta:
                      requestId: req_rag_001
                      bridgeVersion: v1
                      durationMs: 28
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '404':
          $ref: '#/components/responses/NotFoundError'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin_api/openclaw/rag/context:
    post:
      tags:
        - Rag
      operationId: buildRecallContext
      summary: Build structured recall blocks for OpenClaw context assembly
      description: |
        将对话上下文、召回预算与检索策略转换为适合注入 OpenClaw context engine 的 recall blocks。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RagContextRequest'
            examples:
              buildContext:
                value:
                  conversation:
                    lastUserMessage: 请结合之前的运维记录回答
                    lastAssistantMessage: 我先检索相关历史信息
                    recentMessages:
                      - role: user
                        content: 生产环境昨晚告警很多
                      - role: assistant
                        content: 我先看下相关日志和历史记录
                  memoryTargets:
                    - diary.default
                  budget:
                    maxBlocks: 4
                    maxTokens: 1200
                  policy:
                    minScore: 0.7
                    allowTimeAware: true
                    allowGroupAware: false
                    allowRerank: true
                  requestContext:
                    source: openclaw
                    agentId: agent.support
                    sessionId: sess_1001
                    requestId: oc_req_003
      responses:
        '200':
          description: Recall blocks built
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
            x-openclaw-bridge-version:
              $ref: '#/components/headers/XOpenClawBridgeVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RagContextResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      recallBlocks:
                        - id: recall_001
                          text: 昨晚 22:00 之后多次告警与数据库连接池打满有关
                          score: 0.91
                          estimatedTokens: 52
                          metadata:
                            source: diary.default
                            timestamp: '2026-03-28T22:10:00Z'
                      estimatedTokens: 52
                      appliedPolicy:
                        minScore: 0.7
                        maxBlocks: 4
                        maxTokens: 1200
                    meta:
                      requestId: req_ctx_001
                      bridgeVersion: v1
                      durationMs: 35
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalError'
  /admin_api/openclaw/memory/write:
    post:
      tags:
        - Memory
      operationId: writeMemory
      summary: Write durable OpenClaw memory into VCP diary system
      description: 将 OpenClaw 产生的长期记忆写回到 VCP diary 体系。
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MemoryWriteRequest'
            examples:
              writeMemory:
                value:
                  target:
                    diary: default
                  memory:
                    text: 用户偏好在回答中优先给出可执行命令
                    tags:
                      - preference
                      - answer-style
                    timestamp: '2026-03-29T09:05:00Z'
                  options:
                    idempotencyKey: mem_001
                    deduplicate: true
                  requestContext:
                    source: openclaw
                    agentId: agent.support
                    sessionId: sess_1001
                    requestId: oc_req_004
      responses:
        '200':
          description: Memory written
          headers:
            x-request-id:
              $ref: '#/components/headers/XRequestId'
            x-openclaw-bridge-version:
              $ref: '#/components/headers/XOpenClawBridgeVersion'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MemoryWriteResponse'
              examples:
                success:
                  value:
                    success: true
                    data:
                      writeStatus: created
                      diary: default
                      entryId: diary_entry_1001
                      deduplicated: false
                    meta:
                      requestId: req_mem_001
                      bridgeVersion: v1
                      durationMs: 18
        '400':
          $ref: '#/components/responses/BadRequestError'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
        '403':
          $ref: '#/components/responses/ForbiddenError'
        '500':
          $ref: '#/components/responses/InternalError'
components:
  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
  headers:
    XRequestId:
      required: true
      description: Server generated request id
      schema:
        type: string
    XOpenClawBridgeVersion:
      required: true
      description: Active bridge version
      schema:
        type: string
        const: v1
  responses:
    UnauthorizedError:
      description: Authentication failed
      headers:
        x-request-id:
          $ref: '#/components/headers/XRequestId'
        x-openclaw-bridge-version:
          $ref: '#/components/headers/XOpenClawBridgeVersion'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            unauthorized:
              value:
                success: false
                error: Unauthorized
                code: OCW_AUTH_UNAUTHORIZED
                details:
                  reason: invalid credentials
                meta:
                  requestId: req_err_401
                  bridgeVersion: v1
                  durationMs: 1
    BadRequestError:
      description: Invalid request payload or query
      headers:
        x-request-id:
          $ref: '#/components/headers/XRequestId'
        x-openclaw-bridge-version:
          $ref: '#/components/headers/XOpenClawBridgeVersion'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            invalidPayload:
              value:
                success: false
                error: Invalid request payload
                code: OCW_TOOL_INVALID_ARGS
                details:
                  field: args.query
                meta:
                  requestId: req_err_400
                  bridgeVersion: v1
                  durationMs: 2
    ForbiddenError:
      description: Access denied or approval required
      headers:
        x-request-id:
          $ref: '#/components/headers/XRequestId'
        x-openclaw-bridge-version:
          $ref: '#/components/headers/XOpenClawBridgeVersion'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            forbidden:
              value:
                success: false
                error: Tool approval required
                code: OCW_TOOL_APPROVAL_REQUIRED
                details:
                  toolName: search_knowledge
                meta:
                  requestId: req_err_403
                  bridgeVersion: v1
                  durationMs: 3
    NotFoundError:
      description: Requested resource or target not found
      headers:
        x-request-id:
          $ref: '#/components/headers/XRequestId'
        x-openclaw-bridge-version:
          $ref: '#/components/headers/XOpenClawBridgeVersion'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              value:
                success: false
                error: Tool not found
                code: OCW_TOOL_NOT_FOUND
                details:
                  toolName: missing_tool
                meta:
                  requestId: req_err_404
                  bridgeVersion: v1
                  durationMs: 2
    TimeoutError:
      description: Upstream tool invocation timed out
      headers:
        x-request-id:
          $ref: '#/components/headers/XRequestId'
        x-openclaw-bridge-version:
          $ref: '#/components/headers/XOpenClawBridgeVersion'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            timeout:
              value:
                success: false
                error: Tool timeout
                code: OCW_TOOL_TIMEOUT
                details:
                  timeoutMs: 30000
                meta:
                  requestId: req_err_504
                  bridgeVersion: v1
                  durationMs: 30005
    InternalError:
      description: Internal bridge error
      headers:
        x-request-id:
          $ref: '#/components/headers/XRequestId'
        x-openclaw-bridge-version:
          $ref: '#/components/headers/XOpenClawBridgeVersion'
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            internal:
              value:
                success: false
                error: Internal bridge error
                code: OCW_INTERNAL_UNKNOWN
                details:
                  phase: execution
                meta:
                  requestId: req_err_500
                  bridgeVersion: v1
                  durationMs: 6
  schemas:
    BridgeMeta:
      type: object
      additionalProperties: false
      required:
        - requestId
        - bridgeVersion
        - durationMs
      properties:
        requestId:
          type: string
        bridgeVersion:
          type: string
          const: v1
        durationMs:
          type: integer
          minimum: 0
    ErrorCode:
      type: string
      enum:
        - OCW_AUTH_UNAUTHORIZED
        - OCW_AUTH_FORBIDDEN
        - OCW_TOOL_NOT_FOUND
        - OCW_TOOL_INVALID_ARGS
        - OCW_TOOL_APPROVAL_REQUIRED
        - OCW_TOOL_TIMEOUT
        - OCW_TOOL_EXECUTION_ERROR
        - OCW_RAG_INVALID_QUERY
        - OCW_RAG_TARGET_FORBIDDEN
        - OCW_RAG_TARGET_NOT_FOUND
        - OCW_RAG_SEARCH_ERROR
        - OCW_CONTEXT_INVALID_INPUT
        - OCW_CONTEXT_TARGET_FORBIDDEN
        - OCW_CONTEXT_BUILD_ERROR
        - OCW_MEMORY_INVALID_PAYLOAD
        - OCW_MEMORY_TARGET_FORBIDDEN
        - OCW_MEMORY_WRITE_ERROR
        - OCW_INTERNAL_UNKNOWN
    ErrorResponse:
      type: object
      additionalProperties: false
      required:
        - success
        - error
        - code
        - meta
      properties:
        success:
          type: boolean
          const: false
        error:
          type: string
        code:
          $ref: '#/components/schemas/ErrorCode'
        details:
          type: object
          additionalProperties: true
        meta:
          $ref: '#/components/schemas/BridgeMeta'
    RequestContext:
      type: object
      additionalProperties: false
      required:
        - source
        - agentId
        - sessionId
        - requestId
      properties:
        source:
          type: string
          const: openclaw
        agentId:
          type: string
        sessionId:
          type: string
        requestId:
          type: string
    ToolDescriptor:
      type: object
      additionalProperties: false
      required:
        - name
        - displayName
        - pluginType
        - distributed
        - approvalRequired
        - timeoutMs
        - description
        - inputSchema
      properties:
        name:
          type: string
        displayName:
          type: string
        pluginType:
          type: string
          enum:
            - synchronous
            - asynchronous
            - hybridservice
        distributed:
          type: boolean
        approvalRequired:
          type: boolean
        timeoutMs:
          type: integer
          minimum: 0
        description:
          type: string
        inputSchema:
          type: object
          additionalProperties: true
          description: 任意 JSON Schema 对象
    RagTarget:
      type: object
      additionalProperties: false
      required:
        - id
        - displayName
        - type
        - allowed
      properties:
        id:
          type: string
        displayName:
          type: string
        type:
          type: string
          enum:
            - diary
            - knowledge_base
        allowed:
          type: boolean
    RagItem:
      type: object
      additionalProperties: false
      required:
        - id
        - text
        - score
        - sourceDiary
        - sourceFile
      properties:
        id:
          type: string
        text:
          type: string
        score:
          type: number
        sourceDiary:
          type: string
        sourceFile:
          type: string
        timestamp:
          type: string
          format: date-time
        tags:
          type: array
          items:
            type: string
    RecallBlock:
      type: object
      additionalProperties: false
      required:
        - id
        - text
        - score
        - estimatedTokens
        - metadata
      properties:
        id:
          type: string
        text:
          type: string
        score:
          type: number
        estimatedTokens:
          type: integer
          minimum: 0
        metadata:
          type: object
          additionalProperties: true
    HealthData:
      type: object
      additionalProperties: false
      required:
        - status
        - serverTime
        - pluginManagerReady
        - knowledgeBaseReady
        - bridgeVersion
      properties:
        status:
          type: string
          const: ok
        serverTime:
          type: string
          format: date-time
        pluginManagerReady:
          type: boolean
        knowledgeBaseReady:
          type: boolean
        bridgeVersion:
          type: string
          const: v1
    CapabilitiesServerInfo:
      type: object
      additionalProperties: false
      required:
        - name
        - version
        - bridgeVersion
      properties:
        name:
          type: string
        version:
          type: string
        bridgeVersion:
          type: string
          const: v1
    MemoryFeatures:
      type: object
      additionalProperties: false
      required:
        - timeAware
        - groupAware
        - rerank
        - tagMemo
        - writeBack
      properties:
        timeAware:
          type: boolean
        groupAware:
          type: boolean
        rerank:
          type: boolean
        tagMemo:
          type: boolean
        writeBack:
          type: boolean
    CapabilitiesMemory:
      type: object
      additionalProperties: false
      required:
        - targets
        - features
      properties:
        targets:
          type: array
          items:
            $ref: '#/components/schemas/RagTarget'
        features:
          $ref: '#/components/schemas/MemoryFeatures'
    CapabilitiesData:
      type: object
      additionalProperties: false
      required:
        - server
        - tools
        - memory
      properties:
        server:
          $ref: '#/components/schemas/CapabilitiesServerInfo'
        tools:
          type: array
          items:
            $ref: '#/components/schemas/ToolDescriptor'
        memory:
          $ref: '#/components/schemas/CapabilitiesMemory'
    ToolInvokeAudit:
      type: object
      additionalProperties: false
      required:
        - approvalUsed
        - distributed
      properties:
        approvalUsed:
          type: boolean
        distributed:
          type: boolean
    InvokeToolRequest:
      type: object
      additionalProperties: false
      required:
        - args
        - requestContext
      properties:
        args:
          type: object
          additionalProperties: true
        requestContext:
          $ref: '#/components/schemas/RequestContext'
    InvokeToolData:
      type: object
      additionalProperties: false
      required:
        - toolName
        - result
        - audit
      properties:
        toolName:
          type: string
        result:
          type: object
          additionalProperties: true
        audit:
          $ref: '#/components/schemas/ToolInvokeAudit'
    RagTargetsData:
      type: object
      additionalProperties: false
      required:
        - targets
      properties:
        targets:
          type: array
          items:
            $ref: '#/components/schemas/RagTarget'
    RagSearchOptions:
      type: object
      additionalProperties: false
      properties:
        timeAware:
          type: boolean
