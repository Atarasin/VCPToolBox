<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StoryOrchestrator Panel</title>
    <style>
        :root {
            --bg-color: #0d1117;
            --text-color: #f0f6fc;
            --sidebar-bg: #161b22;
            --border-color: #30363d;
            --accent-color: #58a6ff;
            --error-color: #f85149;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        #app {
            display: flex;
            width: 100%;
            height: 100%;
        }

        .sidebar {
            width: 250px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .sidebar h2 {
            margin: 0 20px 20px 20px;
            font-size: 1.2rem;
            color: var(--accent-color);
        }

        .nav-link {
            padding: 10px 20px;
            color: var(--text-color);
            text-decoration: none;
            display: block;
            transition: background-color 0.2s;
        }

        .nav-link:hover, .nav-link.active {
            background-color: rgba(139, 148, 158, 0.1);
            border-left: 3px solid var(--accent-color);
            padding-left: 17px;
        }

        .main-content {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
        }

        .loading {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            font-size: 1.2rem;
            color: #8b949e;
        }

        .error-box {
            background: rgba(248, 81, 73, 0.1);
            border: 1px solid var(--error-color);
            border-radius: 6px;
            padding: 16px;
            margin: 20px;
            color: var(--error-color);
            font-family: monospace;
            white-space: pre-wrap;
            word-break: break-word;
        }
    </style>
</head>
<body>
    <div id="app">
        <div class="sidebar">
            <h2>StoryOrchestrator</h2>
            <nav>
                <a href="#/stories" class="nav-link">Stories</a>
                <a href="#/review-queue" class="nav-link">Review Queue</a>
                <a href="#/settings" class="nav-link">Settings</a>
            </nav>
        </div>
        <div class="main-content" id="router-view">
            <div class="loading" id="loading-msg">Loading StoryOrchestrator Panel...</div>
        </div>
    </div>

    <div id="error-container"></div>

    <script type="module">
        // Error handling
        window.addEventListener('error', (e) => {
            console.error('Global error:', e.error);
            const errorContainer = document.getElementById('error-container');
            const loadingMsg = document.getElementById('loading-msg');
            if (loadingMsg) loadingMsg.style.display = 'none';
            if (errorContainer) {
                errorContainer.innerHTML = `<div class="error-box">Error: ${e.error?.message || e.message}<br>File: ${e.filename}<br>Line: ${e.lineno}</div>`;
            }
        });

        window.addEventListener('unhandledrejection', (e) => {
            console.error('Unhandled rejection:', e.reason);
            const errorContainer = document.getElementById('error-container');
            const loadingMsg = document.getElementById('loading-msg');
            if (loadingMsg) loadingMsg.style.display = 'none';
            if (errorContainer) {
                errorContainer.innerHTML = `<div class="error-box">Unhandled Promise Rejection: ${e.reason?.message || e.reason}</div>`;
            }
        });
    </script>

    <script type="module" src="js/app.js"></script>
</body>
</html>
